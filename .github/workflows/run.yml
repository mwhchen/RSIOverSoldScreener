name: RSI OverSold Scanner (4:30pm NY Time Mon-Fri)

on:
  schedule:
    # GitHub Actions uses UTC. 
    # 20:30 UTC is 4:30 PM EDT (Summer) (Mar - Nov)
    - cron: '30 20 * * 1-5'
    # 21:30 UTC is 4:30 PM EST (Winter) (Nov - Mar)
    - cron: '30 21 * * 1-5'
  workflow_dispatch: # Allows manual triggering

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: write # Required to save JSON data back to the repo

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Set up Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          cache: 'pip' # Speeds up subsequent runs

      - name: Install Dependencies
        run: |
          python -m pip install --upgrade pip
          pip install yfinance pandas requests tqdm openpyxl python-dotenv

      - name: Show Trigger Time
        run: |
          echo "=============================="
          echo "UTC: $(date -u '+%Y-%m-%d %H:%M:%S UTC')"
          echo "NY : $(TZ='America/New_York' date '+%Y-%m-%d %H:%M:%S %Z')"
          echo "=============================="

      - name: Run RSI Analysis
        env:
          # Match the variable name used in sp500_rsi_analyzer.py
          DISCORD_WEBHOOK: ${{ secrets.DISCORD_WEBHOOK }}
        run: python RSIOverSoldScreener.py

      - name: Commit and Push Changes
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          # Add the folders where our script saves data
          git add SP500/*.json RSI_Analysis/*.json RSI_Analysis/*.xlsx Scans/*.xlsx
          git commit -m "Auto-update RSI data and analysis: $(date +'%Y-%m-%d %H:%M')" || echo "No changes to commit"
          git push

      - name: Upload Excel Reports as Artifacts
        uses: actions/upload-artifact@v4
        with:
          name: RSI-Reports-${{ github.run_id }}
          path: |
            Scans/*.xlsx
            RSI_Analysis/*.xlsx
          if-no-files-found: warn
