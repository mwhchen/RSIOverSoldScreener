name: RSI OverSold Scanner (run at 4:30pm NY Time Mon to Fri)
on:
  schedule:
    # 15:00 UTC is 11:00 AM EDT (March to November)
    - cron: '0 15 * * 1-5'
    # 16:00 UTC is 11:00 AM EST (December to Feb) for Winter
    # - cron: '0 16 * * 1-5'
  workflow_dispatch: # Allows you to run it manually via the Actions tab

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - name: Print time
        run: date
        
  build:
    needs: test
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v3

      - name: Set up Python 3.12.9
        uses: actions/setup-python@v4
        with:
          python-version: '3.12.9'

      - name: Cache Ticker Data
        uses: actions/cache@v3
        with:
          path: ticker_cache.json
          # This key uses the date so it refreshes periodically
          key: ${{ runner.os }}-ticker-cache-${{ github.run_id }}
          restore-keys: |
            ${{ runner.os }}-ticker-cache-

      - name: Install Dependencies
        run: |
          python -m pip install --upgrade pip
          pip install yfinance pandas numpy requests xlsxwriter py_vollib lxml openpyxl tqdm schedule

      - name: Show Trigger
        run: |
          echo "=============================="
          echo "Workflow Trigger Time"
          echo "UTC: $(date -u '+%Y-%m-%d %H:%M:%S UTC')"
          echo "NY : $(TZ='America/New_York' date '+%Y-%m-%d %H:%M:%S %Z')"
          echo "=============================="

      - name: Run RSI OverSold Screener
        env:
          # Link your GitHub Secrets to the script environment
          DISCORD_WEBHOOK: ${{ secrets.DISCORD_WEBHOOK }}
          WHATSAPP_PHONE: ${{ secrets.WHATSAPP_PHONE }}
          WHATSAPP_KEY: ${{ secrets.WHATSAPP_KEY }}
        run: python RSI OverSold Screener.py

      - name: Verify Cache File
        run: ls -lh  # This lists all files and their sizes
        
      # Upload only Excel reports (clean)
      - name: Upload Report
        uses: actions/upload-artifact@v4
        with:
          name: Report-${{ github.run_id }}
          path: "*.xlsx"
          if-no-files-found: warn

      # Upload debug ONLY if something fails
      - name: Upload Debug Cache
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: Debug-${{ github.run_id }}
          path: ticker_cache.json
