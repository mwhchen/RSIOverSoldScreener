name: RSI OverSold Scanner (4:30pm NY Time Mon-Fri)

on:
  schedule:
    # GitHub Actions uses UTC. 
    # 20:30 UTC is 4:30 PM EDT (Summer) (Mar - Nov)
    - cron: '30 20 * * 1-5'
    # 21:30 UTC is 4:30 PM EST (Winter) (Nov - Mar)
    #- cron: '30 21 * * 1-5'
  workflow_dispatch: # Allows manual triggering

jobs:
  check-market-holiday:
    runs-on: ubuntu-latest
    outputs:
      should_run: ${{ steps.gatekeeper.outputs.should_run }}
    steps:
      - name: Check Market Holiday
        id: gatekeeper
        run: |
          # Get current date in YYYY-MM-DD format
          TODAY=$(TZ="America/New_York" date +%Y-%m-%d)
          
          # List of 2026 US Market Holidays
          HOLIDAYS=(
            "2026-01-01" # New Year's Day
            "2026-01-19" # Martin Luther King, Jr. Day
            "2026-02-16" # Washington's Birthday
            "2026-04-03" # Good Friday
            "2026-05-25" # Memorial Day
            "2026-06-19" # Juneteenth
            "2026-07-03" # Independence Day (Observed)
            "2026-09-07" # Labor Day
            "2026-11-26" # Thanksgiving Day
            "2026-12-25" # Christmas Day
          )

          # Default to run
          RESULT="true"
          for day in "${HOLIDAYS[@]}"; do
            if [ "$TODAY" == "$day" ]; then
              RESULT="false"
              echo "Holiday detected: $TODAY. Skipping work."
            fi
          done
          echo "should_run=$RESULT" >> "$GITHUB_OUTPUT"

  build:
    needs: check-market-holiday
    if: needs.check-market-holiday.outputs.should_run == 'true'
    runs-on: ubuntu-latest
    permissions:
      contents: write # Required to save JSON data back to the repo

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Set up Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          cache: 'pip' # Speeds up subsequent runs

      - name: Install Dependencies
        run: |
          python -m pip install --upgrade pip
          pip install yfinance pandas requests tqdm openpyxl python-dotenv lxml

      - name: Show Trigger Time
        run: |
          echo "=============================="
          echo "UTC: $(date -u '+%Y-%m-%d %H:%M:%S UTC')"
          echo "NY : $(TZ='America/New_York' date '+%Y-%m-%d %H:%M:%S %Z')"
          echo "=============================="

      - name: Run RSI Analysis
        env:
          # Match the variable name used in sp500_rsi_analyzer.py
          DISCORD_WEBHOOK: ${{ secrets.DISCORD_WEBHOOK }}
        run: python RSIOverSoldScreener.py

      - name: Compress Large Files and Push
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
  
          # 1. Compress files larger than 100MB
          # This replaces 'large.json' with 'large.json.gz'
          find SP500/ RSI_Analysis/ Scans/ -type f -size +100M \( -name "*.json" -o -name "*.xlsx" \) -exec gzip --best --force {} \;
  
          # 2. Stage the entire directories
          # This is safer than using wildcards (*) which can fail on new folders
          git add SP500/ RSI_Analysis/ Scans/
  
          # 3. Check if there is anything to commit
          if [ -n "$(git status --porcelain)" ]; then
            echo "Changes detected. Committing..."
            git commit -m "Auto-update: $(date +'%Y-%m-%d %H:%M') (large files compressed)"
            git push
          else
            echo "No changes to commit. Skipping."
          fi
          
      - name: Upload Excel Reports as Artifacts
        uses: actions/upload-artifact@v4
        with:
          name: RSI-Reports-${{ github.run_id }}
          path: |
            Scans/*.xlsx
            RSI_Analysis/*.xlsx
          if-no-files-found: warn
